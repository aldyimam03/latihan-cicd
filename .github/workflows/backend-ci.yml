name: Backend CI

on: 
    push: 
        branches: [main, dev]
        paths: 
            - 'backend/**'
            - '.github/workflows/backend-ci.yml'
    pull_request:
        branches: [main, dev] 
        paths: 
            - 'backend/**'
            - '.github/workflows/backend-ci.yml'

jobs: 
    backend-test:
        runs-on: ubuntu-latest 

        defaults: 
            run:
                working-directory: backend
                
        steps:
            - name: Ambil Kode
              uses: actions/checkout@v6

            - name: Setup Node.js 
              uses: actions/setup-node@v4
              with: 
                node-version: '20'
                cache: npm
                cache-dependency-path: backend/package-lock.json

            - name: Install Dependencies
              run: npm ci

            - name: Jalankan Tests Backend
              run: npm test

            
