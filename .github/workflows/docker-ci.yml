name: Docker CI 

on: 
    push: 
        branches: [main, dev]
        paths: 
            - 'backend/**'
            - 'github/workflows/docker-ci.yml'

    pull_request:
        branches: [main, dev] 
        paths: 
            - 'backend/**'
            - 'github/workflows/docker-ci.yml'

jobs:
    docker-build: 
        runs-on: ubuntu-latest

        steps: 
            - name: Ambil Kode
              uses: actions/checkout@v6

            - name: Build Docker Image
              run: docker build -t latihan-cicd-backend ./backend